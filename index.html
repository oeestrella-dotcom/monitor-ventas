<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitor de Reclutadores — Grupo Avantex</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #F0F4F8; color: #2D3748; }
    #root { max-width: 760px; margin: 0 auto; padding: 0 0 2rem; }
    .header { background: #fff; border-bottom: 3px solid #2A9FD8; padding: 0.75rem 1.25rem; display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; }
    .logo-svg { height: 36px; }
    .header-title { font-size: 13px; color: #718096; border-left: 1px solid #e2e8f0; padding-left: 12px; margin-left: 4px; }
    .content { padding: 0 1rem; }
    .tab-btn { padding: 6px 16px; border-radius: 8px; border: 1px solid #CBD5E0; background: transparent; cursor: pointer; font-size: 14px; color: #4A5568; }
    .tab-btn.active { background: #2A9FD8; border-color: #2A9FD8; color: #fff; font-weight: 500; }
    .sub-btn { padding: 5px 12px; border-radius: 8px; border: 1px solid #CBD5E0; background: transparent; cursor: pointer; font-size: 12px; color: #4A5568; }
    .sub-btn.active { background: #EBF8FF; border-color: #2A9FD8; color: #2A9FD8; font-weight: 500; }
    .action-btn { padding: 5px 12px; border-radius: 8px; border: 1px solid #CBD5E0; background: transparent; cursor: pointer; font-size: 12px; color: #4A5568; }
    .action-btn:hover { background: #EBF8FF; border-color: #2A9FD8; color: #2A9FD8; }
    .card { background: #fff; border: 1px solid #E2E8F0; border-radius: 12px; padding: 1rem 1.25rem; }
    .metric-card { background: #fff; border-radius: 10px; padding: 0.75rem 1rem; border-left: 3px solid #2A9FD8; }
    input, select, textarea { font-family: inherit; outline: none; }
    input:focus, select:focus { border-color: #2A9FD8 !important; box-shadow: 0 0 0 2px #2A9FD822; }
    .progress-bar { flex: 1; height: 8px; background: #EDF2F7; border-radius: 99px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: #fff; border-radius: 14px; border: 1px solid #E2E8F0; padding: 1.5rem; width: min(430px, 92vw); }
    .btn-primary { padding: 8px 20px; border-radius: 8px; border: none; background: #2A9FD8; color: #fff; cursor: pointer; font-size: 14px; font-weight: 500; }
    .btn-primary:hover { background: #1a8fc8; }
    .btn-cancel { padding: 8px 16px; border-radius: 8px; border: 1px solid #CBD5E0; background: transparent; cursor: pointer; font-size: 14px; color: #718096; }
    .field-label { font-size: 12px; color: #718096; display: block; margin-bottom: 4px; }
    .field-input { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid #CBD5E0; font-size: 14px; margin-bottom: 0.75rem; background: #fff; color: #2D3748; }
  </style>
</head>
<body>
<div id="root"><p style="padding:2rem;color:#718096">Cargando...</p></div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAqlw-VwhGKvVFigW3cKkhWuDkbJuaphsQ",
    authDomain: "monitor-ventas-b1fec.firebaseapp.com",
    projectId: "monitor-ventas-b1fec",
    storageBucket: "monitor-ventas-b1fec.firebasestorage.app",
    messagingSenderId: "503466390490",
    appId: "1:503466390490:web:f20fa32efd2f574d4fc6e3"
  };

  const firebaseApp = initializeApp(firebaseConfig);
  const db = getFirestore(firebaseApp);

  const BLUE = "#2A6FBF", GRAY = "#3A3F4E", LIGHT_BLUE = "#EBF3FF";
  const RESULTADOS = [
    "Declinado por el reclutador",
    "Se pasó con el cliente interno",
    "No se presentó a la entrevista",
    "No está interesado en el trabajo",
    "No le fue atractivo el salario",
    "No contestó llamada",
    "Enviado a buzón",
    "Número no existente",
    "Pidió que se le llamara después"
  ];
  const AG_COLORS = ["#2A6FBF","#1a5fa0","#3A3F4E","#4A5878"];
  const INIT_AGENTES = [
    { id: "ag1", nombre: "Zaid Loredo",     tel: "", meta: 10, color: AG_COLORS[0] },
    { id: "ag2", nombre: "Marifer Lopez",   tel: "", meta: 10, color: AG_COLORS[1] },
    { id: "ag3", nombre: "Jazmín Cazares",  tel: "", meta: 10, color: AG_COLORS[2] },
    { id: "ag4", nombre: "Efraín Estrella", tel: "", meta: 10, color: AG_COLORS[3] },
  ];

  let agentes = [...INIT_AGENTES];
  let llamadas = [];
  let vista = "admin";
  let tab = "dashboard";
  let agenteActivo = null;
  let detalleAgente = null;
  let fechaVista = hoy();
  let modalLlamada = false;
  let modalAgente = false;
  let modalRecordatorio = false;
  let editId = null;
  let formLlamada = { numero: "", duracion: "", resultado: RESULTADOS[0], nota: "" };
  let formAg = { nombre: "", tel: "", meta: 10 };
  let recordatorioMsg = "";

  function hoy() { return new Date().toISOString().slice(0, 10); }
  function formatHora(iso) { return new Date(iso).toLocaleTimeString("es-MX", { hour: "2-digit", minute: "2-digit" }); }
  function iniciales(n) { return n.split(" ").map(w => w[0]).slice(0, 2).join("").toUpperCase(); }
  function getLast7Days() {
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date(); d.setDate(d.getDate() - (6 - i));
      return d.toISOString().slice(0, 10);
    });
  }
  function shortDate(iso) { const [,m,d] = iso.split("-"); return `${d}/${m}`; }
  function llamadasDia(agId, fecha = fechaVista) { return llamadas.filter(l => l.agenteId === agId && l.fecha === fecha); }
  function status(ag, fecha = fechaVista) {
    const n = llamadasDia(ag.id, fecha).length;
    if (n >= ag.meta) return "success";
    if (n >= ag.meta * 0.6) return "warning";
    return "danger";
  }
  function statusLabel(s) { return s === "success" ? "Meta cumplida" : s === "warning" ? "En progreso" : "Por debajo"; }
  function statusColor(s) { return s === "success" ? "#276749" : s === "warning" ? "#B7791F" : "#C53030"; }
  function statusBg(s) { return s === "success" ? "#C6F6D5" : s === "warning" ? "#FEFCBF" : "#FED7D7"; }

  const LOGO_SVG = `<svg class="logo-svg" viewBox="0 0 210 44" xmlns="http://www.w3.org/2000/svg">
    <text x="0" y="13" font-family="Arial,sans-serif" font-size="9" font-weight="600" fill="#2A9FD8" letter-spacing="2">GRUPO</text>
    <text x="0" y="38" font-family="Arial,sans-serif" font-size="28" font-weight="800" fill="#4A5568" letter-spacing="-0.5">AVANTEX</text>
    <polygon points="172,8 184,8 194,22 184,38 178,38 188,22 178,8" fill="#2A9FD8" opacity="0.9"/>
  </svg>`;

  onSnapshot(collection(db, "llamadas"), snap => { llamadas = snap.docs.map(d => ({ id: d.id, ...d.data() })); render(); });
  onSnapshot(collection(db, "agentes"), snap => { if (!snap.empty) agentes = snap.docs.map(d => ({ id: d.id, ...d.data() })); render(); });

  async function guardarLlamada() {
    if (!formLlamada.numero.trim()) return;
    await addDoc(collection(db, "llamadas"), { agenteId: agenteActivo, numero: formLlamada.numero, duracion: formLlamada.duracion, resultado: formLlamada.resultado, nota: formLlamada.nota, fecha: hoy(), hora: new Date().toISOString() });
    formLlamada = { numero: "", duracion: "", resultado: RESULTADOS[0], nota: "" };
    modalLlamada = false; render();
  }
  async function eliminarLlamada(id) { await deleteDoc(doc(db, "llamadas", id)); }
  async function guardarAgente() {
    if (!formAg.nombre.trim()) return;
    if (editId) {
      await setDoc(doc(db, "agentes", editId), { ...formAg, meta: Number(formAg.meta), color: agentes.find(a => a.id === editId)?.color || AG_COLORS[0] });
    } else {
      const newId = "ag" + Date.now();
      await setDoc(doc(db, "agentes", newId), { nombre: formAg.nombre, tel: formAg.tel, meta: Number(formAg.meta), color: AG_COLORS[agentes.length % AG_COLORS.length] });
    }
    formAg = { nombre: "", tel: "", meta: 10 }; editId = null; modalAgente = false; render();
  }
  async function eliminarAgente(id) {
    await deleteDoc(doc(db, "agentes", id));
    const snap = await getDocs(collection(db, "llamadas"));
    snap.docs.filter(d => d.data().agenteId === id).forEach(d => deleteDoc(doc(db, "llamadas", d.id)));
    if (detalleAgente === id) detalleAgente = null;
  }
  function exportCSV() {
    const rows = [["Reclutador","Teléfono","Fecha","Hora","Número marcado","Duración (min)","Resultado","Nota"]];
    llamadas.forEach(l => {
      const ag = agentes.find(a => a.id === l.agenteId);
      rows.push([ag?.nombre||"", ag?.tel||"", l.fecha, formatHora(l.hora), l.numero, l.duracion, l.resultado, l.nota]);
    });
    const csv = rows.map(r => r.map(c => `"${String(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF"+csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `llamadas_${hoy()}.csv`; a.click();
    URL.revokeObjectURL(url);
  }
  function generarRecordatorio() {
    const bajos = agentes.filter(ag => llamadasDia(ag.id).length < ag.meta * 0.6);
    recordatorioMsg = bajos.length === 0
      ? "✅ ¡Todos los reclutadores van bien o ya cumplieron su meta hoy!"
      : `🔔 Recordatorio de meta diaria\n\nHoy (${hoy()}) los siguientes reclutadores aún no alcanzan su meta mínima:\n\n${bajos.map(ag=>`• ${ag.nombre}: lleva ${llamadasDia(ag.id).length} de ${ag.meta} llamadas`).join("\n")}\n\n¡Ánimo, aún hay tiempo para lograrlo! 💪`;
    modalRecordatorio = true; render();
  }
  function copiarRecordatorio() {
    navigator.clipboard.writeText(recordatorioMsg).catch(()=>{});
    const btn = document.getElementById("btn-copiar");
    if (btn) { btn.textContent = "¡Copiado!"; setTimeout(()=>{ btn.textContent = "Copiar mensaje"; }, 2000); }
  }

  function render() {
    const root = document.getElementById("root");
    if (!root) return;
    const days7 = getLast7Days();
    const totales = {
      total: agentes.reduce((s,a) => s + llamadasDia(a.id).length, 0),
      cumplieron: agentes.filter(a => llamadasDia(a.id).length >= a.meta).length,
      pasados: llamadas.filter(l => l.fecha === fechaVista && l.resultado === "Se pasó con el cliente interno").length,
    };
    const agentesBajos = agentes.filter(ag => llamadasDia(ag.id).length < ag.meta * 0.6);
    root.innerHTML = `
    <div class="header">
      ${LOGO_SVG}
      <span class="header-title">Monitor de Reclutadores</span>
    </div>
    <div class="content">
      <div style="display:flex;gap:8px;margin-bottom:1.25rem;border-bottom:1px solid #E2E8F0;padding-bottom:0.75rem">
        <button class="tab-btn ${vista==='admin'?'active':''}" onclick="setVista('admin')">Administrador</button>
        <button class="tab-btn ${vista==='agente'?'active':''}" onclick="setVista('agente')">Reclutador</button>
      </div>
      ${vista === "admin" ? renderAdmin(days7, totales, agentesBajos) : renderAgente()}
    </div>
    ${modalLlamada ? renderModalLlamada() : ""}
    ${modalAgente ? renderModalAgente() : ""}
    ${modalRecordatorio ? renderModalRecordatorio() : ""}`;
    bindEvents();
  }

  function renderAdmin(days7, totales, agentesBajos) {
    return `
    <div style="display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center">
      <div style="display:flex;gap:6px">
        <button class="sub-btn ${tab==='dashboard'?'active':''}" onclick="setTab('dashboard')">Dashboard</button>
        <button class="sub-btn ${tab==='grafica'?'active':''}" onclick="setTab('grafica')">Gráfica semanal</button>
      </div>
      <div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">
        <button class="action-btn" onclick="generarRecordatorio()" style="${agentesBajos.length?'color:#C53030;border-color:#FEB2B2':''}">🔔 Recordatorio${agentesBajos.length?' ('+agentesBajos.length+')':''}</button>
        <button class="action-btn" onclick="exportCSV()">⬇ Exportar CSV</button>
        <button class="action-btn" onclick="abrirNuevoAgente()">+ Reclutador</button>
      </div>
    </div>
    ${tab === "dashboard" ? renderDashboard(totales) : renderGrafica(days7)}`;
  }

  function renderDashboard(totales) {
    return `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem">
      <label style="font-size:12px;color:#718096">Fecha:</label>
      <input type="date" id="fecha-input" value="${fechaVista}" style="font-size:13px;padding:4px 8px;border-radius:8px;border:1px solid #CBD5E0;background:#fff;color:#2D3748"/>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1.25rem">
      ${[["Llamadas totales",totales.total,"#2A9FD8"],["Metas cumplidas",`${totales.cumplieron}/${agentes.length}`,"#276749"],["Pasados a cliente",totales.pasados,"#B7791F"]].map(([l,v,c])=>`
      <div class="metric-card" style="border-left-color:${c}">
        <p style="font-size:11px;color:#718096;margin:0 0 4px">${l}</p>
        <p style="font-size:22px;font-weight:700;margin:0;color:${c}">${v}</p>
      </div>`).join("")}
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${agentes.map(ag => {
        const n = llamadasDia(ag.id).length;
        const pct = Math.min(100, Math.round((n/ag.meta)*100));
        const st = status(ag);
        const open = detalleAgente === ag.id;
        return `
        <div class="card">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
            <div style="width:38px;height:38px;border-radius:50%;background:${ag.color}18;border:2px solid ${ag.color}44;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:${ag.color};flex-shrink:0">${iniciales(ag.nombre)}</div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                <span style="font-weight:600;font-size:14px;color:#2D3748">${ag.nombre}</span>
                <span style="font-size:10px;padding:2px 8px;border-radius:99px;background:${statusBg(st)};color:${statusColor(st)};font-weight:500">${statusLabel(st)}</span>
              </div>
              ${ag.tel?`<span style="font-size:11px;color:#A0AEC0">${ag.tel}</span>`:""}
            </div>
            <div style="display:flex;gap:5px">
              <button onclick="toggleDetalle('${ag.id}')" class="action-btn">${open?"Ocultar":"Detalle"}</button>
              <button onclick="editarAgente('${ag.id}')" class="action-btn">Editar</button>
              <button onclick="eliminarAgente('${ag.id}')" class="action-btn" style="color:#C53030;border-color:#FEB2B2">✕</button>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="progress-bar">
              <div style="width:${pct}%;height:100%;background:${statusColor(st)};border-radius:99px;transition:width 0.4s"></div>
            </div>
            <span style="font-size:13px;font-weight:600;min-width:50px;color:${statusColor(st)}">${n} / ${ag.meta}</span>
          </div>
          ${open ? `
          <div style="margin-top:12px;border-top:1px solid #EDF2F7;padding-top:10px">
            ${llamadasDia(ag.id).length===0
              ? `<p style="font-size:13px;color:#A0AEC0;margin:0">Sin llamadas registradas este día.</p>`
              : `<div style="overflow-x:auto"><table style="width:100%;font-size:12px;border-collapse:collapse;min-width:420px">
                  <thead><tr>${["Hora","Número","Min","Resultado","Nota",""].map(h=>`<th style="text-align:left;padding-bottom:6px;font-weight:500;color:#A0AEC0;padding-right:8px">${h}</th>`).join("")}</tr></thead>
                  <tbody>${llamadasDia(ag.id).map(l=>`
                    <tr style="border-top:1px solid #EDF2F7">
                      <td style="padding:5px 8px 5px 0;color:#A0AEC0;white-space:nowrap">${formatHora(l.hora)}</td>
                      <td style="padding:5px 8px 5px 0;color:#2D3748">${l.numero}</td>
                      <td style="padding:5px 8px 5px 0;color:#A0AEC0">${l.duracion||"—"}</td>
                      <td style="padding:5px 8px 5px 0"><span style="padding:2px 7px;border-radius:99px;font-size:11px;background:${l.resultado==="Se pasó con el cliente interno"?"#C6F6D5":"#EDF2F7"};color:${l.resultado==="Se pasó con el cliente interno"?"#276749":"#718096"}">${l.resultado}</span></td>
                      <td style="padding:5px 8px 5px 0;color:#A0AEC0;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.nota||"—"}</td>
                      <td><button onclick="eliminarLlamada('${l.id}')" class="action-btn" style="color:#C53030;border-color:#FEB2B2;font-size:11px;padding:2px 6px">✕</button></td>
                    </tr>`).join("")}
                  </tbody></table></div>`}
          </div>` : ""}
        </div>`;
      }).join("")}
    </div>`;
  }

  function renderGrafica(days7) {
    const maxVal = Math.max(...agentes.flatMap(ag => days7.map(f => llamadasDia(ag.id,f).length)), agentes[0]?.meta||10) + 2;
    const W=600,H=200,PAD={t:10,r:10,b:30,l:28};
    const chartW=W-PAD.l-PAD.r, chartH=H-PAD.t-PAD.b;
    const barW=Math.floor(chartW/days7.length/(agentes.length+1));
    const groupW=barW*agentes.length+4;
    let bars="",xLabels="",yLines="";
    for(let i=0;i<=5;i++){
      const val=Math.round((maxVal/5)*i);
      const y=PAD.t+chartH-(val/maxVal)*chartH;
      yLines+=`<line x1="${PAD.l}" y1="${y}" x2="${W-PAD.r}" y2="${y}" stroke="#EDF2F7" stroke-width="1"/>`;
      yLines+=`<text x="${PAD.l-4}" y="${y+4}" text-anchor="end" font-size="10" fill="#A0AEC0">${val}</text>`;
    }
    days7.forEach((fecha,di)=>{
      const groupX=PAD.l+(di/days7.length)*chartW+(chartW/days7.length-groupW)/2;
      agentes.forEach((ag,ai)=>{
        const n=llamadasDia(ag.id,fecha).length;
        const bh=Math.max((n/maxVal)*chartH, n>0?2:0);
        bars+=`<rect x="${groupX+ai*(barW+1)}" y="${PAD.t+chartH-bh}" width="${barW}" height="${bh}" fill="${ag.color}" rx="2"/>`;
      });
      const lx=PAD.l+(di/days7.length)*chartW+(chartW/days7.length)/2;
      xLabels+=`<text x="${lx}" y="${H-8}" text-anchor="middle" font-size="10" fill="#A0AEC0">${shortDate(fecha)}</text>`;
    });
    const metaY=PAD.t+chartH-((agentes[0]?.meta||10)/maxVal)*chartH;
    const resumen=agentes.map(ag=>{
      const total=days7.reduce((s,f)=>s+llamadasDia(ag.id,f).length,0);
      const dias=days7.filter(f=>llamadasDia(ag.id,f).length>=ag.meta).length;
      return `<div class="metric-card" style="border-left-color:${ag.color}">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
          <span style="font-size:12px;font-weight:600;color:#2D3748">${ag.nombre.split(" ")[0]}</span>
        </div>
        <p style="font-size:20px;font-weight:700;margin:0 0 2px;color:${ag.color}">${total}</p>
        <p style="font-size:11px;color:#A0AEC0;margin:0">${dias}/7 días con meta</p>
      </div>`;
    }).join("");
    return `
    <div class="card">
      <p style="font-weight:600;font-size:14px;margin:0 0 4px;color:#2D3748">Llamadas por reclutador — últimos 7 días</p>
      <p style="font-size:12px;color:#A0AEC0;margin:0 0 1rem">La línea punteada indica la meta mínima.</p>
      <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:1rem">
        ${agentes.map(ag=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:${ag.color}"></div><span style="font-size:12px;color:#718096">${ag.nombre.split(" ")[0]}</span></div>`).join("")}
      </div>
      <div style="overflow-x:auto">
        <svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
          ${yLines}
          <line x1="${PAD.l}" y1="${metaY}" x2="${W-PAD.r}" y2="${metaY}" stroke="#2A9FD8" stroke-dasharray="4,3" stroke-width="1.5" opacity="0.5"/>
          ${bars}${xLabels}
        </svg>
      </div>
      <div style="margin-top:1.25rem;border-top:1px solid #EDF2F7;padding-top:1rem">
        <p style="font-weight:600;font-size:13px;margin:0 0 0.75rem;color:#2D3748">Resumen semanal</p>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px">${resumen}</div>
      </div>
    </div>`;
  }

  function renderAgente() {
    const ag = agentes.find(a => a.id === agenteActivo);
    return `
    <div style="margin-bottom:1rem">
      <label class="field-label">Selecciona tu nombre:</label>
      <select id="agente-select" class="field-input" style="margin-bottom:0">
        <option value="">— Selecciona —</option>
        ${agentes.map(a=>`<option value="${a.id}" ${agenteActivo===a.id?"selected":""}>${a.nombre}</option>`).join("")}
      </select>
    </div>
    ${ag ? renderAgentePanel(ag) : ""}`;
  }

  function renderAgentePanel(ag) {
    const n = llamadasDia(ag.id).length;
    const pct = Math.min(100, Math.round((n/ag.meta)*100));
    const st = status(ag);
    return `
    <div class="card" style="margin-bottom:1rem">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div style="width:46px;height:46px;border-radius:50%;background:${ag.color}18;border:2px solid ${ag.color};display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:${ag.color}">${iniciales(ag.nombre)}</div>
        <div>
          <p style="margin:0;font-weight:600;color:#2D3748">${ag.nombre}</p>
          <p style="margin:0;font-size:12px;color:#A0AEC0">Meta del día: ${ag.meta} llamadas</p>
        </div>
        <span style="margin-left:auto;font-size:11px;padding:3px 10px;border-radius:99px;background:${statusBg(st)};color:${statusColor(st)};font-weight:500">${statusLabel(st)}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <div class="progress-bar">
          <div style="width:${pct}%;height:100%;background:${statusColor(st)};border-radius:99px"></div>
        </div>
        <span style="font-size:14px;font-weight:700;color:${statusColor(st)}">${n}/${ag.meta}</span>
      </div>
      <button onclick="abrirModalLlamada()" class="btn-primary" style="width:100%;padding:10px">+ Registrar llamada</button>
    </div>
    <div class="card">
      <p style="margin:0 0 10px;font-weight:600;font-size:14px;color:#2D3748">Llamadas de hoy</p>
      ${llamadasDia(ag.id).length===0
        ? `<p style="font-size:13px;color:#A0AEC0;margin:0">Aún no has registrado llamadas.</p>`
        : llamadasDia(ag.id).map(l=>`
          <div style="display:flex;gap:10px;padding:8px 0;border-top:1px solid #EDF2F7;align-items:center">
            <span style="font-size:12px;color:#A0AEC0;min-width:42px">${formatHora(l.hora)}</span>
            <span style="font-size:13px;flex:1;color:#2D3748">${l.numero}</span>
            <span style="font-size:11px;padding:2px 7px;border-radius:99px;background:${l.resultado==="Se pasó con el cliente interno"?"#C6F6D5":"#EDF2F7"};color:${l.resultado==="Se pasó con el cliente interno"?"#276749":"#718096"}">${l.resultado}</span>
            <button onclick="eliminarLlamada('${l.id}')" class="action-btn" style="color:#C53030;border-color:#FEB2B2;font-size:11px;padding:2px 6px">✕</button>
          </div>`).join("")}
    </div>`;
  }

  function renderModalLlamada() {
    return `
    <div class="modal-overlay">
      <div class="modal">
        <p style="font-weight:600;font-size:15px;margin:0 0 1rem;color:#2D3748">Registrar llamada</p>
        <label class="field-label">Número marcado *</label>
        <input id="f-numero" type="tel" placeholder="55 1234 5678" value="${formLlamada.numero}" class="field-input"/>
        <label class="field-label">Duración (minutos)</label>
        <input id="f-duracion" type="number" placeholder="Ej. 5" value="${formLlamada.duracion}" class="field-input"/>
        <label class="field-label">Resultado</label>
        <select id="f-resultado" class="field-input">
          ${RESULTADOS.map(r=>`<option ${formLlamada.resultado===r?"selected":""}>${r}</option>`).join("")}
        </select>
        <label class="field-label">Nota (opcional)</label>
        <input id="f-nota" type="text" placeholder="Comentario rápido..." value="${formLlamada.nota}" class="field-input"/>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:0.5rem">
          <button onclick="cerrarModalLlamada()" class="btn-cancel">Cancelar</button>
          <button onclick="submitLlamada()" class="btn-primary">Guardar</button>
        </div>
      </div>
    </div>`;
  }

  function renderModalAgente() {
    return `
    <div class="modal-overlay">
      <div class="modal">
        <p style="font-weight:600;font-size:15px;margin:0 0 1rem;color:#2D3748">${editId?"Editar reclutador":"Nuevo reclutador"}</p>
        <label class="field-label">Nombre completo *</label>
        <input id="ag-nombre" type="text" placeholder="Ej. Carlos López" value="${formAg.nombre}" class="field-input"/>
        <label class="field-label">Teléfono / WhatsApp</label>
        <input id="ag-tel" type="tel" placeholder="55 1234 5678" value="${formAg.tel}" class="field-input"/>
        <label class="field-label">Meta mínima de llamadas/día *</label>
        <input id="ag-meta" type="number" placeholder="Ej. 10" value="${formAg.meta}" class="field-input"/>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:0.5rem">
          <button onclick="cerrarModalAgente()" class="btn-cancel">Cancelar</button>
          <button onclick="submitAgente()" class="btn-primary">Guardar</button>
        </div>
      </div>
    </div>`;
  }

  function renderModalRecordatorio() {
    return `
    <div class="modal-overlay">
      <div class="modal">
        <p style="font-weight:600;font-size:15px;margin:0 0 0.75rem;color:#2D3748">Recordatorio generado</p>
        <p style="font-size:12px;color:#718096;margin:0 0 0.75rem">Copia este mensaje y envíalo por WhatsApp:</p>
        <textarea readonly style="width:100%;height:180px;padding:8px 10px;border-radius:8px;border:1px solid #CBD5E0;font-size:13px;line-height:1.6;resize:none;background:#F7FAFC;color:#2D3748">${recordatorioMsg}</textarea>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem">
          <button onclick="cerrarModalRecordatorio()" class="btn-cancel">Cerrar</button>
          <button id="btn-copiar" onclick="copiarRecordatorio()" class="btn-primary">Copiar mensaje</button>
        </div>
      </div>
    </div>`;
  }

  function bindEvents() {
    const fi = document.getElementById("fecha-input");
    if (fi) fi.addEventListener("change", e => { fechaVista = e.target.value; render(); });
    const as = document.getElementById("agente-select");
    if (as) as.addEventListener("change", e => { agenteActivo = e.target.value || null; render(); });
  }

  window.setVista = v => { vista = v; render(); };
  window.setTab = t => { tab = t; render(); };
  window.toggleDetalle = id => { detalleAgente = detalleAgente === id ? null : id; render(); };
  window.abrirNuevoAgente = () => { formAg={nombre:"",tel:"",meta:10}; editId=null; modalAgente=true; render(); };
  window.editarAgente = id => { const ag=agentes.find(a=>a.id===id); if(ag){formAg={nombre:ag.nombre,tel:ag.tel,meta:ag.meta};editId=id;modalAgente=true;render();} };
  window.eliminarAgente = id => eliminarAgente(id);
  window.abrirModalLlamada = () => { modalLlamada=true; render(); };
  window.cerrarModalLlamada = () => { modalLlamada=false; render(); };
  window.cerrarModalAgente = () => { modalAgente=false; editId=null; render(); };
  window.cerrarModalRecordatorio = () => { modalRecordatorio=false; render(); };
  window.eliminarLlamada = id => eliminarLlamada(id);
  window.exportCSV = exportCSV;
  window.generarRecordatorio = generarRecordatorio;
  window.copiarRecordatorio = copiarRecordatorio;
  window.submitLlamada = () => {
    formLlamada.numero = document.getElementById("f-numero")?.value||"";
    formLlamada.duracion = document.getElementById("f-duracion")?.value||"";
    formLlamada.resultado = document.getElementById("f-resultado")?.value||RESULTADOS[0];
    formLlamada.nota = document.getElementById("f-nota")?.value||"";
    guardarLlamada();
  };
  window.submitAgente = () => {
    formAg.nombre = document.getElementById("ag-nombre")?.value||"";
    formAg.tel = document.getElementById("ag-tel")?.value||"";
    formAg.meta = document.getElementById("ag-meta")?.value||10;
    guardarAgente();
  };

  render();
</script>
</body>
</html>
